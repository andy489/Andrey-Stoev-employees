<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Pair Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/styles/style.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
<div class="container">
    <a href="/" class="btn btn-outline-primary btn-back">← Upload Another File</a>

    <div class="header">
        <h1>Analysis Results</h1>
        <p class="lead" th:text="${message}"></p>
        <p><strong>File:</strong> <span th:text="${filename}"></span></p>
    </div>

    <div th:if="${topPair}" class="top-pair-card">
        <h3>🏆 Longest Working Pair</h3>
        <div class="row mt-3">
            <div class="col-md-4">
                <h5>Employee #1</h5>
                <p class="display-6" th:text="${topPair.empId1}"></p>
            </div>
            <div class="col-md-4">
                <h5>Employee #2</h5>
                <p class="display-6" th:text="${topPair.empId2}"></p>
            </div>
            <div class="col-md-4">
                <h5>Total Days Together</h5>
                <p class="display-6" th:text="${topPair.totalDaysWorked}"></p>
            </div>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(pairs)}" class="table-container">
        <h3 class="mb-3">All Employee Pairs</h3>

        <div th:each="pair : ${pairs}" class="pair-section">
            <div class="pair-header">
                <h4>
                    Employee <span th:text="${pair.empId1}"></span> & <span th:text="${pair.empId2}"></span>
                </h4>
                <span class="badge bg-success" th:text="${pair.totalDaysWorked} + ' total days'"></span>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>Employee ID #1</th>
                        <th>Employee ID #2</th>
                        <th>Project ID</th>
                        <th>Days Worked Together</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${pair.projects}">
                        <td th:text="${pair.empId1}"></td>
                        <td th:text="${pair.empId2}"></td>
                        <td th:text="${project.projectId}"></td>
                        <td th:text="${project.daysWorked}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(pairs)}" class="alert alert-warning">
        No employee pairs with overlapping work periods found.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/scripts/main.js"></script>
</body>
</html>
